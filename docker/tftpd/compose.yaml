---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  tftpd:
    image: registry.gitlab.com/kalaksi-containers/tftpd:1.6@sha256:6e3a44958bc4e6fb3f72d1c870c3a32809c7c8d72c8601eb684d49047b90e7fd
    container_name: tftpd
    restart: unless-stopped
    environment:
      TFTPD_BIND_ADDRESS: "0.0.0.0:1069"
      TFTPD_EXTRA_ARGS: "--blocksize 1468"
    volumes:
      - ${APPS_DATASET:-/mnt/data_pool/app}/tftpd/data:/tftpboot
    ports:
      - "69:1069/udp"
    # security
    cap_drop:
      - all
    cap_add:
      - CAP_SETGID
      - CAP_SETUID
      - CAP_SYS_CHROOT
    security_opt:
      - no-new-privileges
    read_only: true
