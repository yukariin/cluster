---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  matchbox:
    image: quay.io/poseidon/matchbox:v0.11.0@sha256:06bcdae85335fd00e8277b007b55cfb49d96a0114628c0f70db2b92b079d246a
    container_name: matchbox
    user: "1000:1000"
    restart: unless-stopped
    command:
      - "-address=0.0.0.0:8080"
      - "-assets-path=/var/lib/matchbox/assets"
    configs:
      - source: groups-default
        target: /var/lib/matchbox/groups/default.json
      - source: profiles-default
        target: /var/lib/matchbox/profiles/default.json
      - source: assets-default-ipxe
        target: /var/lib/matchbox/assets/default.ipxe
    volumes:
      - ${APPS_DATASET:-/mnt/data_pool/app}/matchbox/config:/var/lib/matchbox
      - ${APPS_DATASET:-/mnt/data_pool/app}/matchbox/assets:/var/lib/matchbox/assets
    networks:
      - proxy_network
    # traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy_network
      # Matchbox
      traefik.http.services.matchbox.loadbalancer.server.port: "8080"
      traefik.http.routers.matchbox.entrypoints: websecure
      traefik.http.routers.matchbox.rule: Host(`matchbox.${ROOT_DOMAIN}`)
      traefik.http.routers.matchbox.service: matchbox
      traefik.http.routers.matchbox.tls: true
      traefik.http.routers.matchbox.tls.certresolver: letsencrypt
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    read_only: true

configs:
  groups-default:
    file: ./config/groups/default.json
  profiles-default:
    file: ./config/profiles/default.json
  assets-default-ipxe:
    file: ./config/assets/default.ipxe

networks:
  proxy_network:
    external: true
