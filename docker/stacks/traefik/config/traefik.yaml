---
# yaml-language-server: $schema=https://json.schemastore.org/traefik-v3.json
global:
  checkNewVersion: true
  sendAnonymousUsage: false

log:
  level: INFO
accesslog: {}
#   format: json
#   fields:
#     defaultMode: keep
#     headers:
#       defaultMode: keep

api:
  dashboard: true
  disableDashboardAd: true
  insecure: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http3:
      advertisedPort: 443
    http:
      tls:
        certResolver: letsencrypt

# certificatesResolvers configured via CLI args in compose.yaml

providers:
  docker:
    exposedByDefault: false
    network: proxy_network
  file:
    directory: /config
    watch: true
