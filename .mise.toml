[env]
KUBECONFIG = "{{config_root | canonicalize}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root | canonicalize}}/.minijinja.toml"
TALOSCONFIG = "{{config_root | canonicalize}}/talosconfig"
LEFTHOOK_OUTPUT = "false"

_.file = [
  "{{config_root}}/.secrets.env",
]

[hooks]
enter = "just doctor"
postinstall = "lefthook install"

[tools]
"github:home-operations/flate" = "latest"
"github:mitsuhiko/minijinja" = "latest"
cilium-cli = "latest"
flux2 = "latest"
gh = "latest"
gum = "latest"
helm = "3" # v4's rewritten --wait deadlocks on PodDisruptionBudgets (cert-manager/ESO/flux); bootstrap targets helm 3
helmfile = "latest"
jq = "latest"
just = "latest"
kubectl = "latest"
kustomize = "latest"
lefthook = "latest"
talos = "latest"
yamlfmt = "latest"
"github:elsesiy/kubectl-view-secret" = { version = "latest", rename_exe = "kubectl-view_secret" }
