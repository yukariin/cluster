---
# Mounts the app's client cert + the server CA into its pod so it can connect to
# the pooler with sslmode=verify-full. Assumes a bjw-s app-template HelmRelease.
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      version: v2
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        values:
          persistence:
            postgres-certs:
              type: secret
              name: postgres-${PG_APP}-cert
              defaultMode: 0640
              globalMounts:
                - path: /var/run/secrets/postgresql
            postgres-server-ca:
              type: secret
              name: postgres-server-ca
              defaultMode: 0440
              globalMounts:
                - path: /var/run/secrets/postgres-server-ca
