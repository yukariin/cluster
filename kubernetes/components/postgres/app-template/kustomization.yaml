---
# Shared-cluster access for bjw-s app-template apps: client cert + URL ConfigMap,
# with the cert and server CA mounted into the pod for sslmode=verify-full.
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.config.k8s.io/component_v1alpha1.json
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
components:
  - ../base/cert
resources:
  - configmap.yaml
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      version: v2
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: not-used
      spec:
        values:
          persistence:
            postgres-certs:
              type: secret
              name: postgres-${PG_APP}-cert
              defaultMode: 0600
              globalMounts:
                - path: /var/run/secrets/postgresql
            postgres-server-ca:
              type: secret
              name: postgres-server-ca
              defaultMode: 0440
              globalMounts:
                - path: /var/run/secrets/postgres-server-ca
