---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: postgres-${PG_APP}-cert
spec:
  commonName: ${DATABASE_OWNER:=${PG_APP}}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: postgres-client-ca
  secretName: postgres-${PG_APP}-cert
  usages:
    - client auth
