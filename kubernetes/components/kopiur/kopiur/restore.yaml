---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: ${APP}-restore
spec:
  credentialProjection:
    enabled: true
  mover:
    securityContext:
      runAsUser: ${KOPIUR_PUID:=568}
      runAsGroup: ${KOPIUR_PGID:=568}
  policy:
    onMissingSnapshot: Continue # default for fromPolicy — empty volume if none
  source:
    fromPolicy:
      name: ${APP}
      offset: 0 # 0 = latest snapshot
  target:
    populator: {}
