---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: postgres-server-cert
spec:
  commonName: postgres-rw
  dnsNames:
    - postgres-r
    - postgres-r.database.svc
    - postgres-r.database.svc.cluster.local
    - postgres-ro
    - postgres-ro.database.svc
    - postgres-ro.database.svc.cluster.local
    - postgres-rw
    - postgres-rw.database.svc
    - postgres-rw.database.svc.cluster.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: postgres-server-ca
  secretName: postgres-server-cert
  secretTemplate:
    labels:
      cnpg.io/reload: ""
  usages:
    - server auth

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
