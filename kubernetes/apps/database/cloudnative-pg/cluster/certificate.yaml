spec:
  commonName: streaming_replica
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: postgres-client-ca
  secretName: postgres-replication-cert
  secretTemplate:
    labels:
      cnpg.io/reload: ""
  usages:
    - client auth

