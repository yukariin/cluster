---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: paperless
spec:
  launchUrl: https://paperless.mistelinn.org
  callbackUrls:
    - https://paperless.mistelinn.org/accounts/oidc/pocket-id/login/callback/
  allowedUserGroups:
    - name: docs
      namespace: security
  pkceEnabled: true
  skipConsent: true
  secret:
    keys:
      clientID: OIDC_CLIENT_ID
      clientSecret: OIDC_CLIENT_SECRET
