---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
spec:
  components:
    - ../../../../components/dragonfly
    - ../../../../components/keda
    - ../../../../components/volsync
  dependsOn:
    - name: democratic-csi
      namespace: democratic-csi
    - name: dragonfly
      namespace: database
  interval: 1h
  path: kubernetes/apps/personal/paperless/app
  prune: true
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: personal
