---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea
spec:
  parentRefs:
    - { name: internal, namespace: kube-system }
  hostnames:
    - "gitea.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - name: gitea-http
          namespace: personal
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
