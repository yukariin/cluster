---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-openwrt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          webhook:
            image:
              repository: renanqts/external-dns-openwrt-webhook
              tag: v0.1.0@sha256:a356eb7ead234dc673108c30de761ed9f9542709fc0d8cc8332f81dd53a74d63
            env:
              SHUTDOWN_TIMEOUT_SECONDS: "5"
              LOG_LEVEL: info
              LOG_STACK_TRACE: "false"
              LOG_ENCODING: json
              ROUTER_HEALTHCHECK_INTERVAL: /ping
              ROUTER_HEALTHCHECK_PORT: "8888"
              ROUTER_GIN_RELEASE_MODE: "true"
              PROVIDER_OPENWRT_LUCIRPC_HOSTNAME: 192.168.1.1
              PROVIDER_OPENWRT_LUCIRPC_PORT: "80"
              PROVIDER_OPENWRT_LUCIRPC_SSL: "false"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probe1
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8888
                  initialDelaySeconds: 10
                  timeoutSeconds: 5
              readiness: *probe1
            restartPolicy: Always
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: registry.k8s.io/external-dns/external-dns
              tag: v0.20.0@sha256:ddc7f4212ed09a21024deb1f470a05240837712e74e4b9f6d1f2632ff10672e7
            args:
              - --domain-filter=${CLUSTER_DOMAIN}
              - --events
              - --gateway-name=internal
              - --interval=1m
              - --log-format=text
              - --log-level=info
              - --policy=sync
              - --provider=webhook
              - --registry=txt
              - --source=service
              - --source=gateway-httproute
              - --txt-owner-id=k8s
              - --txt-prefix=k8s.
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 7979
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext: *securityContext
        serviceAccount:
          name: *app
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
