---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  values:
    gitea:
      admin:
        existingSecret: &secret forgejo-secret
      additionalConfigSources:
        - secret:
            secretName: forgejo-app-secret
      config:
        admin:
          DISABLE_REGULAR_ORG_CREATION: true
        attachment:
          ENABLED: true
          MAX_SIZE: 64
          PATH: /data/data/attachments
          STORAGE_TYPE: local
        avatar:
          PATH: /data/data/avatars
          STORAGE_TYPE: local
        badges:
          ENABLED: true
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: "redis://forgejo-dragonfly:6379/0?pool_size=100&idle_timeout=180s"
        cron.archive_cleanup:
          ENABLED: true
          OLDER_THAN: 2h
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
        database:
          DB_TYPE: sqlite3
          PATH: /data/data/database/forgejo.db
        federation:
          ENABLED: false
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        lfs:
          PATH: /data/git/lfs
        log:
          MODE: console
        log.console:
          COLORIZE: false
          FLAGS: journaldflags
          STDERR: true
        mailer:
          ENABLED: true
          FROM: "Forgejo <forgejo@mistelinn.org>"
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.network.svc.cluster.local
          SMTP_PORT: 25
          SUBJECT_PREFIX: "[FORGEJO]"
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: true
          WHITELISTED_URIS: "authentik.mistelinn.org"
        picture:
          DISABLE_GRAVATAR: true
          ENABLE_FEDERATED_AVATAR: false
        queue:
          TYPE: redis
          CONN_STR: "redis://forgejo-dragonfly:6379/1?pool_size=100&idle_timeout=180s"
        repo-avatar:
          PATH: /data/data/repo-avatars
          STORAGE_TYPE: local
        repository:
          DEFAULT_BRANCH: master
          DEFAULT_PRIVATE: true
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
          POPULATE_SQUASH_COMMENT_WITH_COMMIT_MESSAGES: true
          DEFAULT_DELETE_BRANCH_AFTER_MERGE: true
        repository.signing:
          CRUD_ACTIONS: pubkey, parentsigned
          FORMAT: ssh
          INITIAL_COMMIT: pubkey
          MERGES: pubkey
          SIGNING_EMAIL: "noreply@git.mistelinn.org"
          SIGNING_KEY: /data/git/.ssh-signing/key.pub
          SIGNING_NAME: "git.mistelinn.org Instance"
          WIKI: never
        security:
          INSTALL_LOCK: true
          REVERSE_PROXY_TRUSTED_PROXIES: 10.42.0.0/16
        server:
          DOMAIN: "git.mistelinn.org"
          ENABLE_PPROF: false
          OFFLINE_MODE: true
          ROOT_URL: "https://git.mistelinn.org"
          SSH_DOMAIN: "git.mistelinn.org"
          SSH_PORT: &sshPort 22
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          DISABLE_REGISTRATION: false
          ENABLE_PASSKEY_AUTHENTICATION: false
          SHOW_REGISTRATION_BUTTON: false
        service.explore:
          DISABLE_CODE_PAGE: false
          DISABLE_ORGANIZATIONS_PAGE: true
          DISABLE_USERS_PAGE: true
          REQUIRE_SIGNIN_VIEW: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: "redis://forgejo-dragonfly:6379/2?pool_size=100&idle_timeout=180s"
          SESSION_LIFE_TIME: "1209600"
        storage:
          STORAGE_TYPE: local
        other:
          SHOW_FOOTER_TEMPLATE_LOAD_TIME: false
        ui:
          DEFAULT_THEME: forgejo-dark
        webhook:
          ALLOWED_HOST_LIST: "*"
      oauth:
        - name: Authentik
          adminGroup: admins
          autoDiscoverUrl: "https://authentik.mistelinn.org/application/o/forgejo/.well-known/openid-configuration"
          existingSecret: *secret
          groupClaimName: groups
          provider: openidConnect
          scopes: profile email groups
    signing:
      enabled: true
      ssh:
        existingSecret: forgejo-signing-key-secret
    persistence:
      enabled: true
      create: false
      claimName: *app
    service:
      ssh:
        port: *sshPort
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - "git.mistelinn.org"
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: ssh
