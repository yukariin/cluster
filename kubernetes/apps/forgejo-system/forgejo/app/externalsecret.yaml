---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-admin-secret
    template:
      data:
        # Admin
        username: "{{ .ADMIN_USERNAME }}"
        email: "{{ .ADMIN_EMAIL }}"
        password: "{{ .ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: forgejo

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-app-secret
    template:
      data:
        oauth2: |
          JWT_SECRET={{ .OAUTH2_JWT_SECRET }}
        security: |
          SECRET_KEY={{ .SECURITY_SECRET_KEY }}
          INTERNAL_TOKEN={{ .SECURITY_INTERNAL_TOKEN }}
  dataFrom:
    - extract:
        key: forgejo

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-signing-key-secret
    template:
      data:
        privateKey: "{{ .SIGNING_PRIVATE_KEY }}"
        publicKey: "{{ .SIGNING_PUBLIC_KEY }}"
  dataFrom:
    - extract:
        key: forgejo
