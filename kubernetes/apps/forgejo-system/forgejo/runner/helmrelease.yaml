---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      forgejo-runner:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            runAsNonRoot: true
            runAsGroup: 1000
            runAsUser: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          # must cover runner.shutdown_timeout plus the plugin's 60s cleanup budget
          terminationGracePeriodSeconds: 300
        initContainers:
          # native sidecar: started before, and terminated after, the runner
          # container, so the plugin socket outlives job draining on shutdown
          k8s-plugin:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.6@sha256:b0ffe279448c70fb3327485163da8da2ce12fa9cc39a29231edd676c9025c036
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            restartPolicy: Always
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          runner:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner
              tag: 12.10.2@sha256:d5eeafda573012c229b730f5a18437b464d946473478e1f6bd56fd537b881609
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "http://forgejo-http:3000" \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      automountServiceAccountToken: true
    persistence:
      config:
        type: configMap
        name: forgejo-runner-configmap
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      runner-secret:
        type: secret
        name: forgejo-runner-secret
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: democratic-csi-hostpath
        globalMounts:
          - path: /data/cache
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
    rbac:
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
      roles:
        forgejo-runner:
          type: Role
          rules:
            # Jobs - the plugin creates jobs to run pipeline steps
            - apiGroups:
                - "batch"
              resources:
                - jobs
              verbs:
                - create
                - get
                - list
                - watch
                - delete
            # Pods - only needed when the plugin needs to interact with them (logs, exec)
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - get
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
    serviceAccount:
      forgejo-runner: {}
