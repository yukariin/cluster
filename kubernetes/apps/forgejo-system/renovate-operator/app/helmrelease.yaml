---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 1h
  values:
    fullnameOverride: *app

    route:
      enabled: true
      hostnames:
        - renovate.mistelinn.org
      parentRefs:
        - name: envoy-internal
          namespace: network

    auth:
      oidc:
        enabled: true
        issuerUrl: https://id.mistelinn.org
        existingSecret: renovate-operator-oidc-credentials
        redirectUrl: https://renovate.mistelinn.org/auth/callback
        additionalScopes:
          - groups

    webhook:
      enabled: true
      route:
        enabled: true
        hostnames:
          - renovate-webhook.mistelinn.org
        parentRefs:
          - name: envoy-internal
            namespace: network

  valuesFrom:
    - kind: Secret
      name: renovate-operator-oidc-credentials
      valuesKey: client-id
      targetPath: auth.oidc.clientId
      optional: true
