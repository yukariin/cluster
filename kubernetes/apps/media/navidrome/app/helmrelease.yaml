---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      navidrome:
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: 0.62.0@sha256:c4b5cb36a790b3eb63ca6a68bbe2fe149c2d7fa2e586f7a480e61db630e6664b
            env:
              ND_BASEURL: "https://{{ .Release.Name }}.mistelinn.org"
              ND_CACHEFOLDER: /config/cache
              ND_DATAFOLDER: /config
              ND_ENABLEINSIGHTSCOLLECTOR: false
              ND_IMAGECACHESIZE: 500MB
              ND_MUSICFOLDER: /music
              ND_PORT: &port 80
              ND_SCANNER_SCHEDULE: "@every 1h"
              ND_TRANSCODINGCACHESIZE: 1GB
              ND_TRANSCODING_MAXCONCURRENT: 2
              ND_TRANSCODING_MAXCONCURRENTPERUSER: 1
              ND_ENFORCENONROOTUSER: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
        statefulset:
          volumeClaimTemplates:
            - name: cache
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 5Gi
              advancedMounts:
                app:
                  - path: /config/cache
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: nas.internal
        path: /mnt/data_pool/data
        globalMounts:
          - path: /music
            subPath: media/music
            readOnly: true
      tmp:
        type: emptyDir
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: "https://navidrome.mistelinn.org/ping"
        hostnames:
          - "{{ .Release.Name }}.mistelinn.org"
        parentRefs:
          - {name: envoy-external, namespace: network}
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        ports:
          http:
            port: *port
