---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pinchflat
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      *app :
        containers:
          app:
            image: &img
              repository: ghcr.io/kieraneglin/pinchflat
              tag: latest@sha256:01b4f98aabaf3f5fe394213f7a32578c9e84e42080f52e2f8334021a4473b202
            env:
              TZ: ${CLUSTER_TZ}
              TZ_DATA_DIR: /tmp/elixir_tzdata_data
              LOG_LEVEL: info
              PORT: &port 80
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
        initContainers:
          ytdlp-updates:
            image: *img
            command:
              - "/bin/sh"
              - "-c"
              - |
                cp -r /usr/local/bin/* /local/
            securityContext: *sc
            resources:
              requests:
                cpu: 5m
                memory: 10M
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [65537]
        seccompProfile: { type: RuntimeDefault }
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: nas.internal
        path: /mnt/data_pool/data
        advancedMounts:
          *app :
            app:
              - path: /downloads
                subPath: media/youtube
      tmp:
        type: emptyDir
        advancedMounts:
          *app :
            app:
              - subPath: tmp
                path: /tmp
              - subPath: yt-dlp
                path: /etc/yt-dlp
              # ytdlp update
              - subPath: local
                path: /usr/local/bin
            ytdlp-updates:
              - subPath: local
                path: /local
    route:
      app:
        hostnames:
          - "pinchflat.${CLUSTER_DOMAIN}"
        parentRefs:
          - { name: internal, namespace: kube-system }
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        ports:
          http:
            port: *port
