---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kavita
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      kavita:
        containers:
          app:
            image:
              repository: ghcr.io/kareadita/kavita
              tag: 0.9.0.2@sha256:880a8feff0833e860575f8e08788e4b4f59f8659afd17206566aae88a525130d
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 5000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 30m
                memory: 512Mi
              limits:
                memory: 4Gi
        initContainers:
          01-set-oidc:
            image:
              repository: nixery.dev/shell/jq
              tag: latest
            command:
              - sh
              - -c
              - |
                jq --arg id "$OAUTH_CLIENT_ID" --arg secret "$OAUTH_CLIENT_SECRET" \
                  '.OpenIdConnectSettings.ClientId = $id | .OpenIdConnectSettings.Secret = $secret' \
                  /kavita/config/appsettings.json > /tmp/appsettings.json \
                  && mv /tmp/appsettings.json /kavita/config/appsettings.json
            envFrom:
              - secretRef:
                  name: kavita-oidc-credentials
            securityContext: *sc
            resources:
              requests:
                cpu: 5m
                memory: 10M
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /kavita/config
      media:
        type: nfs
        server: nas.internal
        path: /mnt/data_pool/data
        globalMounts:
          - path: /media
            subPath: media/comics
            readOnly: true
          - path: /books
            subPath: media/books
            readOnly: true
          - path: /light-novels
            subPath: media/light-novels
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /kavita/config/cache
            subPath: cache
          - path: /kavita/config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.mistelinn.org"
        parentRefs:
          - {name: envoy-internal, namespace: network}
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        ports:
          http:
            port: *port
