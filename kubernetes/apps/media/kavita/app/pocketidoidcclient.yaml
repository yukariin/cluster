---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: kavita
spec:
  launchUrl: https://kavita.mistelinn.org
  callbackUrls:
    - https://kavita.mistelinn.org/signin-oidc
  logoutCallbackUrls:
    - https://kavita.mistelinn.org/signout-callback-oidc
  allowedUserGroups:
    - name: users
      namespace: security
  pkceEnabled: true
  secret:
    keys:
      clientID: OAUTH_CLIENT_ID
      clientSecret: OAUTH_CLIENT_SECRET
