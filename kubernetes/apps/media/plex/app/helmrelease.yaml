---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687@sha256:be00a2ad851ea3193cd870636f908eb6425ad89390f23cdb08daa35ab5cceacc
            env:
              PLEX_ADVERTISE_URL: "https://plex.mistelinn.org:443,http://192.168.100.99:32400"
              PLEX_NO_AUTH_NETWORKS: 192.168.10.0/24
              TZ: Europe/Moscow
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              # claims:
              #   - name: gpu
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      # resourceClaims:
      #   - name: gpu
      #     resourceClaimTemplateName: plex-gpu
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: "/config/Library/Application Support/Plex Media Server/Cache"
      media:
        type: nfs
        server: nas.internal
        path: /mnt/data_pool/data
        globalMounts:
          - readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: "/config/Library/Application Support/Plex Media Server/Logs"
            subPath: logs
          - path: /transcode
            subPath: transcode
          - path: /tmp
            subPath: tmp
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: "https://plex.mistelinn.org/identity"
        hostnames:
          - "plex.mistelinn.org"
        parentRefs:
          - {name: envoy-external, namespace: network}
          - {name: envoy-internal, namespace: network}
        rules:
          # https://forums.plex.tv/t/external-srt-subtitles-are-not-working-w-reverse-proxy/886540
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.100.99
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
