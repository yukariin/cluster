---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-mcp

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-mcp-write
rules:
  - apiGroups:
      - fluxcd.controlplane.io
      - helm.toolkit.fluxcd.io
      - image.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
      - source.toolkit.fluxcd.io
    resources:
      - "*"
    verbs:
      - create
      - patch
      - update
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-mcp-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-mcp-write
subjects:
  - kind: ServiceAccount
    name: flux-mcp
    namespace: ai-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-mcp-k8s-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-mcp-read
subjects:
  - kind: ServiceAccount
    name: flux-mcp
    namespace: ai-system
