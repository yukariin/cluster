---
# yaml-language-server: $schema=https://schemas.ajgon.casa/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: kubesearch
spec:
  groupRef:
    name: mcp-tools
  image: ghcr.io/perfectra1n/kubesearch-mcp:1.0.1@sha256:a8e2129500321b491893e08700d6f87fe8f9078efbea546e0ba8d5183c127df1
  podTemplateSpec:
    spec:
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
  mcpPort: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  secrets:
    - key: GITHUB_TOKEN
      name: kubesearch-mcp-secret
  transport: streamable-http
