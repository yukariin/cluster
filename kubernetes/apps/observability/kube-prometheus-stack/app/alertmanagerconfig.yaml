---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: pushover
    groupBy:
      - alertname
      - cluster
      - job
    groupWait: 1m
    groupInterval: 5m
    repeatInterval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            matchType: "="
            value: InfoInhibitor
      - receiver: heartbeat
        groupWait: 0s
        repeatInterval: 2m30s
        matchers:
          - name: alertname
            matchType: "="
            value: Watchdog

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          matchType: "="
          value: critical
      targetMatch:
        - name: severity
          matchType: "="
          value: warning

  receivers:
    - name: blackhole

    - name: heartbeat
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secret
            key: HEARTBEAT_URL

    - name: telegram
      telegramConfigs:
        - sendResolved: true
          chatID: -1003021821850
          messageThreadID: 2
          parseMode: HTML
          botToken:
            name: alertmanager-secret
            key: BOT_TOKEN

          message: |-
            {{- $severity := .CommonLabels.severity -}}
            {{- $status := .Status -}}
            {{- $severityIcon := "⚪️" -}}
            {{- if eq $severity "critical" }}{{ $severityIcon = "🔴" }}{{ else if eq $severity "warning" }}{{ $severityIcon = "🟠" }}{{ end -}}

            {{- if eq $status "firing" -}}
            {{ $severityIcon }} <b>[FIRING:{{ .Alerts.Firing | len }}] {{ .CommonLabels.alertname }}</b>
            {{- else -}}
            ✅ <b>[RESOLVED] {{ .CommonLabels.alertname }}</b>
            {{- end }}

            <b>Severity:</b> {{ $severityIcon }} {{ $severity | title }}
            {{- range .Alerts }}

            ———
            {{- if ne .Annotations.description "" }}
            📝 {{ .Annotations.description }}
            {{- else if ne .Annotations.summary "" }}
            📝 {{ .Annotations.summary }}
            {{- else if ne .Annotations.message "" }}
            📝 {{ .Annotations.message }}
            {{- else }}
            📝 <i>Alert description not available</i>
            {{- end }}

            <b>Labels:</b>
            {{- range .Labels.SortedPairs }}
            • <code>{{ .Name }}</code>: {{ .Value }}
            {{- end }}
            {{- if .Annotations.runbook_url }}

            <a href="{{ .Annotations.runbook_url }}">📖 Runbook</a>
            {{- end }}
            {{- end }}

    - name: pushover
      pushoverConfigs:
        - html: true
          sendResolved: true
          sound: gamelan
          ttl: 86400s
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          token:
            name: alertmanager-secret
            key: PUSHOVER_APP_TOKEN
          userKey:
            name: alertmanager-secret
            key: PUSHOVER_USER_KEY
          urlTitle: View in Alertmanager
