---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 15m
  target:
    name: grafana-secret
    template:
      data:
        # OIDC
        GF_AUTH_GENERIC_OAUTH_API_URL: "https://id.mistelinn.org/api/oidc/userinfo"
        GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://id.mistelinn.org/authorize"
        GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
        GF_AUTH_GENERIC_OAUTH_EMPTY_SCOPES: "false"
        GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
        GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH: "groups"
        GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
        GF_AUTH_GENERIC_OAUTH_NAME: "Pocket ID"
        GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "display_name"
        GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"
        GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email offline_access groups"
        GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://id.mistelinn.org//api/oidc/token"
        GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
        # Admin
        GF_SECURITY_ADMIN_PASSWORD: "{{ .GF_SECURITY_ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: grafana
