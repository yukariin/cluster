---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: grafana
spec:
  launchUrl: https://grafana.mistelinn.org
  callbackUrls:
    - "https://grafana.mistelinn.org/login/generic_oauth"
  logoutCallbackUrls:
    - https://grafana.mistelinn.org
  allowedUserGroups:
    - name: admins
      namespace: security
  pkceEnabled: true
  secret:
    keys:
      clientID: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      clientSecret: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
