---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: services
spec:
  module: https
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # docker on nas
        - https://traefik.${CLUSTER_DOMAIN}
        - https://nas.${CLUSTER_DOMAIN}
        - https://vault.${CLUSTER_DOMAIN}
