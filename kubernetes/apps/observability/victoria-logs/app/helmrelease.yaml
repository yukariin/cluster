---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    fullnameOverride: *app
    server:
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 4Gi
      retentionPeriod: 14d

      route:
        enabled: true
        hostnames:
          - "logs.mistelinn.org"
        parentRefs:
          - {name: envoy-internal, namespace: network}
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /

      serviceMonitor:
        enabled: true

    dashboards:
      enabled: true
