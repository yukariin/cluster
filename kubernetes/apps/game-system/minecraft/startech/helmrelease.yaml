---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: startech
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      startech:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.7.0@sha256:5ffbc91d933e2f0e194a4f49674a2d17b65bb051c86e61961a6c775312ef61c0
            env:
              ALLOW_FLIGHT: true
              BROADCAST_RCON_TO_OPS: false
              DIFFICULTY: peaceful
              ENABLE_WHITELIST: true
              EULA: true
              MAX_MEMORY: 8G
              MODE: survival
              MOD_PLATFORM: AUTO_CURSEFORGE
              CF_SLUG: star-technology
              CF_DOWNLOADS_REPO: /data/downloads
              CF_EXCLUDE_MODS: spark
              SPAWN_PROTECTION: 16
              VIEW_DISTANCE: 10
              LEVEL_TYPE: "skyblockbuilder:skyblock"
            envFrom:
              - secretRef:
                  name: startech-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec: &probeExec
                    command:
                      - mc-health
                  periodSeconds: 60
              readiness: *probes
              startup:
                enabled: true
                spec:
                  exec: *probeExec
                  failureThreshold: 300
                  initialDelaySeconds: 30
                  periodSeconds: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 8Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: startech
        annotations:
          external-dns.alpha.kubernetes.io/hostname: startech.mistelinn.org
          external-dns.alpha.kubernetes.io/target: mc-router.mistelinn.org
          mc-router.itzg.me/externalServerName: startech.mistelinn.org
        ports:
          minecraft:
            port: 25565
          rcon:
            port: 25575
