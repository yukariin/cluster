---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gtnh
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      gtnh:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.7.0@sha256:5ffbc91d933e2f0e194a4f49674a2d17b65bb051c86e61961a6c775312ef61c0
            env:
              EULA: true
              TYPE: CUSTOM
              GENERIC_PACKS: GT_New_Horizons_2.8.4_Server_Java_17-25
              GENERIC_PACKS_SUFFIX: .zip
              GENERIC_PACKS_PREFIX: https://downloads.gtnewhorizons.com/ServerPacks/
              MODS: https://github.com/GTNewHorizons/GTNH-Web-Map/releases/download/0.3.38/gtnh-web-map-0.3.38.jar,https://github.com/GTNewHorizons/worldedit-gtnh/releases/download/v0.0.7/worldedit-v0.0.7.jar
              # if this isn't true, then the container tries to download the modpack every run
              SKIP_GENERIC_PACK_UPDATE_CHECK: "true"
              MEMORY: 8G
              # Make sure that this matches what is in your pack's startserver bash file
              JVM_OPTS: "-Dfml.readTimeout=180 @java9args.txt"
              CUSTOM_SERVER: "https://github.com/GTNewHorizons/lwjgl3ify/releases/download/3.0.26/lwjgl3ify-3.0.26-forgePatches.jar"
              # Set server.properties according to GTNH server defaults
              DIFFICULTY: hard
              ENABLE_COMMAND_BLOCK: true
              SPAWN_PROTECTION: 1
              VIEW_DISTANCE: 8
              MODE: 0
              LEVEL_TYPE: "rwg"
              ALLOW_FLIGHT: true
              # Defaults
              BROADCAST_RCON_TO_OPS: false
              ENABLE_WHITELIST: true
            envFrom:
              - secretRef:
                  name: gtnh-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec: &probeExec
                    command:
                      - mc-health
                  periodSeconds: 60
              readiness: *probes
              startup:
                enabled: true
                spec:
                  exec: *probeExec
                  failureThreshold: 300
                  initialDelaySeconds: 60
                  periodSeconds: 1
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_RAW
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 8Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
    route:
      gtnh-map:
        hostnames:
          - "{{ .Release.Name }}-map.mistelinn.org"
        parentRefs:
          - {name: envoy-internal, namespace: network}
        rules:
          - backendRefs:
              - identifier: app
                port: map
    service:
      app:
        controller: gtnh
        annotations:
          external-dns.alpha.kubernetes.io/hostname: gtnh.mistelinn.org
          external-dns.alpha.kubernetes.io/target: mc-router.mistelinn.org
          mc-router.itzg.me/externalServerName: gtnh.mistelinn.org
        ports:
          minecraft:
            port: 25565
          map:
            port: 8123
          rcon:
            port: 25575
