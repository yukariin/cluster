---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paper
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      paper:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.3@sha256:189ac3760fb9ae7a4f13ad77b092db1b5df236058a28e216bdd81c7f34036964
            env:
              BROADCAST_RCON_TO_OPS: false
              DIFFICULTY: hard
              ENABLE_COMMAND_BLOCK: true
              ENABLE_WHITELIST: true
              EULA: true
              FORCE_GAMEMODE: true
              MAX_MEMORY: 10G
              MODE: survival
              PAPER_CHANNEL: experimental
              PAUSE_WHEN_EMPTY_SECONDS: "600"
              SEED: "1691256543523182218"
              SERVER_NAME: Terra
              SPAWN_PROTECTION: 0
              TYPE: PAPER
              USE_MEOWICE_FLAGS: true
              USE_MEOWICE_GRAALVM_FLAGS: true
              VERSION: 26.1.2
              VIEW_DISTANCE: 32
            envFrom:
              - secretRef:
                  name: paper-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec: &probeExec
                    command:
                      - mc-health
                  periodSeconds: 60
              readiness: *probes
              startup:
                enabled: true
                spec:
                  exec: *probeExec
                  failureThreshold: 300
                  initialDelaySeconds: 30
                  periodSeconds: 1
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_RAW
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 10Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: paper
        annotations:
          external-dns.alpha.kubernetes.io/hostname: mc.mistelinn.org
          external-dns.alpha.kubernetes.io/target: mc-router.mistelinn.org
          mc-router.itzg.me/externalServerName: mc.mistelinn.org
        ports:
          minecraft:
            port: 25565
      rcon:
        controller: paper
        ports:
          rcon:
            port: 25575
            targetPort: 25575
