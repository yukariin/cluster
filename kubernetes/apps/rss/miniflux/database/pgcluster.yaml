---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-miniflux
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  # Single-instance cluster: disable PDB so the node hosting it can be drained
  # for Talos/Kubernetes upgrades (CNPG blocks single-instance drains otherwise).
  enablePDB: false
  managed:
    services:
      disabledDefaultServices:
        - "ro"
        - "r"
  postgresql:
    parameters:
      max_wal_size: 256MB
      wal_keep_size: 64MB
  storage:
    size: 1G
    storageClass: ceph-block

  monitoring:
    enablePodMonitor: true

  bootstrap:
    # initdb:
    #   database: miniflux
    #   owner: miniflux
    recovery:
      source: pg-miniflux-restore
      database: miniflux
      owner: miniflux

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pg-miniflux-store
        serverName: pg-miniflux

  externalClusters:
    - name: pg-miniflux-restore
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: pg-miniflux-store
          serverName: pg-miniflux
