---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux
spec:
  parentRefs:
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "flux.mistelinn.org"
  rules:
    - backendRefs:
        - name: flux-operator
          namespace: flux-system
          port: 9080
