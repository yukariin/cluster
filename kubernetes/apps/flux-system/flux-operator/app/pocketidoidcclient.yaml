---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: flux-web
spec:
  launchUrl: https://flux.mistelinn.org
  callbackUrls:
    - "https://flux.mistelinn.org/oauth2/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
  pkceEnabled: true
  skipConsent: true
  secret:
    keys:
      clientID: client-id
      clientSecret: client-secret
