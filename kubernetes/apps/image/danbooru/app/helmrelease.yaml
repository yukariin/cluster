---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app danbooru
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      *app :
        annotations: &annotations
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: ghcr.io/danbooru/danbooru
              tag: production@sha256:a10f8d48676e7cee507fe151b24a85c703f58a2a4ad8fadc1113eb5d8870b074
            env: &env
              # Base settings
              RAILS_ENV: "production"
              PUMA_WORKERS: "1"
              # App settings
              DANBOORU_APP_NAME: Booru
              DANBOORU_CANONICAL_URL: &appUrl "https://booru.${CLUSTER_DOMAIN}"
              DANBOORU_REDIS_URL: "redis://danbooru-dragonfly.image.svc.cluster.local:6379"
              DANBOORU_IQDB_URL: "http://iqdb.image.svc.cluster.local:5588"
              DANBOORU_AUTOTAGGER_URL: "http://autotagger.image.svc.cluster.local:5000"
              DANBOORU_MAIL_DELIVERY_URL: "smtp://smtp-relay.network.svc.cluster.local:25?openssl_verify_mode=none"
              DANBOORU_IMAGE_STORAGE_PATH: /images
              K8S_NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              K8S_POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: pg-danbooru-app
                    key: uri
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: &appPort 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            lifecycle: &lifecycle
              preStop: { exec: { command: ["sleep", "15"] }}
            securityContext: &containerSec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
          openresty:
            image: *image
            args: ["openresty", "-e", "/dev/stderr"]
            env:
              DANBOORU_CANONICAL_URL: *appUrl
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /nginx/status
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            lifecycle: *lifecycle
            securityContext: *containerSec
      cron:
        containers:
          app:
            image: *image
            args: ["bin/rails", "danbooru:cron"]
            env: *env
            envFrom: *envFrom
            securityContext: *containerSec
      job:
        annotations: *annotations
        containers:
          app:
            image: *image
            args: ["bin/good_job", "start"]
            env: *env
            envFrom: *envFrom
            securityContext: *containerSec
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      nginx-config:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        globalMounts:
          - path: /usr/local/nginx/conf/nginx.conf
            subPath: nginx.conf
            readOnly: true
      images:
        type: nfs
        server: ${NAS_ADDRESS}
        path: /mnt/data_pool/danbooru
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
    route:
      app:
        hostnames:
          - "booru.${CLUSTER_DOMAIN}"
        parentRefs:
          - { name: internal, namespace: kube-system }
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
