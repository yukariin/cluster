---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: danbooru-database
spec:
  dependsOn:
    - name: plugin-barman-cloud
      namespace: database
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: kubernetes/apps/image/danbooru/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: image
  wait: true

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: danbooru-db
spec:
  dependsOn:
    - name: cluster
      namespace: database
  interval: 1h
  path: kubernetes/components/postgres/base/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: true
  timeout: 5m
  retryInterval: 2m
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: DatabaseRole
      inProgress: "!has(status.applied)"
      current: status.applied == true
    - apiVersion: postgresql.cnpg.io/v1
      kind: Database
      inProgress: "!has(status.applied)"
      current: status.applied == true
  postBuild:
    substitute:
      APP: danbooru
      OWNER: danbooru
      DATABASE_EXTENSIONS: "[{name: btree_gin}, {name: fuzzystrmatch}, {name: pg_trgm}, {name: pgcrypto}, {name: pgstattuple}]"

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app danbooru
spec:
  components:
    - ../../../../components/dragonfly
    - ../../../../components/keda
    - ../../../../components/postgres/cert
  dependsOn:
    - name: danbooru-db
    - name: dragonfly
      namespace: database
  interval: 1h
  path: kubernetes/apps/image/danbooru/app
  prune: true
  postBuild:
    substitute:
      APP: *app
      PG_APP: *app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: image
  wait: true

