---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: matrix
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: matrix-secret
    template:
      # Render the synapse/mas config files (matrix-configmap) into the secret,
      # substituting the Pocket ID OIDC credentials pushed to Vault.
      templateFrom:
        - configMap:
            name: matrix-configmap
            items:
              - key: synapse.yaml
              - key: mas.yaml
  dataFrom:
    - extract:
        key: matrix
