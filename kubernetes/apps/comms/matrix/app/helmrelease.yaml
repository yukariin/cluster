---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: matrix
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 26.6.1
  url: oci://ghcr.io/element-hq/ess-helm/matrix-stack

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix
spec:
  chartRef:
    kind: OCIRepository
    name: matrix
  interval: 1h
  timeout: 15m
  values:
    serverName: "matrix.mistelinn.org"

    synapse:
      enabled: true
      ingress:
        host: "matrix.mistelinn.org"
        className: disabled
        tlsEnabled: false
      media:
        storage:
          existingClaim: "{{ .Release.Name }}"
        maxUploadSize: 256M
      postgres:
        host: pg-matrix-rw.comms.svc.cluster.local
        user: matrix
        database: synapse
        password:
          secret: pg-matrix-app
          secretKey: password
      additional:
        0-baseConfig:
          configSecret: matrix-secret
          configSecretKey: synapse.yaml
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 100Mi

    matrixAuthenticationService:
      enabled: true
      ingress:
        host: "matrix-auth.mistelinn.org"
        className: disabled
        tlsEnabled: false
      postgres:
        host: pg-matrix-rw.comms.svc.cluster.local
        user: matrix
        database: mas
        password:
          secret: pg-matrix-app
          secretKey: password
      additional:
        0-baseConfig:
          configSecret: matrix-secret
          configSecretKey: mas.yaml

    matrixRTC:
      enabled: true
      ingress:
        host: "rtc.mistelinn.org"
        className: disabled
        tlsEnabled: false
      sfu:
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 150Mi
        useStunToDiscoverPublicIP: false

    elementAdmin:
      enabled: true
      ingress:
        host: "matrix-admin.mistelinn.org"
        className: disabled
        tlsEnabled: false

    elementWeb:
      enabled: true
      ingress:
        host: "element.mistelinn.org"
        className: disabled
        tlsEnabled: false
      additional:
        extra-config.json: |
          {
            "brand": "Mistelinn Matrix",
            "default_theme": "dark",
            "show_labs_settings": true,
            "force_verification": false,
            "default_server_config": {
              "m.homeserver": {
                "base_url": "https://matrix.mistelinn.org",
                "server_name": "matrix.mistelinn.org"
              },
              "m.identity_server": {
                "base_url": "https://vector.im"
              }
            },
            "features": {
              "feature_video_rooms": true,
              "feature_element_call_video_rooms": true,
              "feature_group_calls": true,
              "feature_new_room_list": false,
              "feature_pinning": true
            },
            "setting_defaults": {
              "FTUE.userOnboardingButton": false,
              "Spaces.allRoomsInHome": true,
              "alwaysShowTimestamps": true
            },
            "jitsi": {
              "preferred_domain": "meet.jit.si"
            },
            "permalink_prefix": "https://element.mistelinn.org"
          }

    wellKnownDelegation:
      enabled: true
      ingress:
        className: disabled
        tlsEnabled: false
      additional:
        server: |
          {
            "m.server": "matrix.mistelinn.org:443"
          }
        client: |
          {
            "m.homeserver": {
              "base_url": "https://matrix.mistelinn.org"
            },
            "m.identity_server": {
              "base_url": "https://vector.im"
            },
            "org.matrix.msc3575.proxy": {
              "url": "https://matrix.mistelinn.org"
            },
            "io.element.e2ee": {
              "force_disable": false,
              "default": false
            },
            "io.element.call": {
              "rtc_backend": "https://rtc.mistelinn.org"
            }
          }

    postgres:
      enabled: false
