---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix
spec:
  chartRef:
    kind: OCIRepository
    name: matrix
  interval: 1h
  timeout: 15m
  values:
    serverName: "matrix.mistelinn.org"

    synapse:
      enabled: true
      ingress:
        host: "matrix.mistelinn.org"
        className: disabled
        tlsEnabled: false
      media:
        storage:
          existingClaim: "{{ .Release.Name }}"
        maxUploadSize: 256M
      postgres:
        host: pooler-rw.database.svc
        user: matrix
        database: synapse
        sslMode: verify-full
        password:
          value: unused-cert-auth
      extraVolumes: &pgVolumes
        - name: postgres-tls
          projected:
            defaultMode: 0440
            sources:
              - secret:
                  name: postgres-matrix-cert
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              - secret:
                  name: postgres-server-ca
                  items:
                    - key: ca.crt
                      path: ca.crt
      extraVolumeMounts: &pgVolumeMounts
        - name: postgres-tls
          mountPath: /var/run/secrets/postgresql
          readOnly: true
      additional:
        0-baseConfig:
          configSecret: matrix-secret
          configSecretKey: synapse.yaml
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 100Mi

    matrixAuthenticationService:
      enabled: true
      ingress:
        host: "mas.mistelinn.org"
        className: disabled
        tlsEnabled: false
      postgres:
        host: pooler-rw.database.svc
        user: matrix
        database: mas
        sslMode: verify-full
        password:
          value: unused-cert-auth
      extraVolumes: *pgVolumes
      extraVolumeMounts: *pgVolumeMounts
      additional:
        0-baseConfig:
          configSecret: matrix-secret
          configSecretKey: mas.yaml

    matrixRTC:
      enabled: true
      ingress:
        host: "rtc.mistelinn.org"
        className: disabled
        tlsEnabled: false
      sfu:
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 150Mi
        useStunToDiscoverPublicIP: false

    elementAdmin:
      enabled: true
      ingress:
        host: "matrix-admin.mistelinn.org"
        className: disabled
        tlsEnabled: false

    elementWeb:
      enabled: true
      ingress:
        host: "element.mistelinn.org"
        className: disabled
        tlsEnabled: false
      additional:
        extra-config.json: |
          {
            "brand": "Mistelinn Matrix",
            "default_theme": "dark",
            "show_labs_settings": true,
            "force_verification": false,
            "default_server_config": {
              "m.homeserver": {
                "base_url": "https://matrix.mistelinn.org",
                "server_name": "matrix.mistelinn.org"
              },
              "m.identity_server": {
                "base_url": "https://vector.im"
              }
            },
            "features": {
              "feature_video_rooms": true,
              "feature_element_call_video_rooms": true,
              "feature_group_calls": true
            },
            "setting_defaults": {
              "FTUE.userOnboardingButton": false
            },
            "jitsi": {
              "preferred_domain": "meet.jit.si"
            },
            "permalink_prefix": "https://element.mistelinn.org"
          }

    wellKnownDelegation:
      enabled: true
      ingress:
        className: disabled
        tlsEnabled: false
      additional:
        server: |
          {
            "m.server": "matrix.mistelinn.org:443"
          }
        client: |
          {
            "m.homeserver": {
              "base_url": "https://matrix.mistelinn.org"
            },
            "m.identity_server": {
              "base_url": "https://vector.im"
            },
            "org.matrix.msc3575.proxy": {
              "url": "https://matrix.mistelinn.org"
            },
            "io.element.e2ee": {
              "default": true,
              "secure_backup_required": false,
              "secure_backup_setup_methods": ["key", "passphrase"]
            },
            "io.element.call": {
              "rtc_backend": "https://rtc.mistelinn.org"
            }
          }

    postgres:
      enabled: false
