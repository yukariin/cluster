---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-synapse
  annotations:
    gatus.home-operations.com/endpoint: |-
      url: "https://matrix.mistelinn.org/_matrix/client/versions"
spec:
  parentRefs:
    - {name: envoy-external, namespace: network}
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "matrix.mistelinn.org"
  rules:
    - backendRefs:
        - name: matrix-well-known
          namespace: comms
          port: 8010
      matches:
        - path:
            type: PathPrefix
            value: /.well-known/matrix
    - backendRefs:
        - name: matrix-matrix-authentication-service
          namespace: comms
          port: 8080
      matches:
        - path:
            type: RegularExpression
            value: "^/_matrix/client/[^/]+/(?:login|logout|refresh)"
    - backendRefs:
        - name: matrix-synapse
          namespace: comms
          port: 8008
      matches:
        - path:
            type: PathPrefix
            value: /_matrix
        - path:
            type: PathPrefix
            value: /_synapse

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-auth-service
  annotations:
    gatus.home-operations.com/endpoint: |-
      url: "https://matrix-auth.mistelinn.org/.well-known/openid-configuration"
spec:
  parentRefs:
    - {name: envoy-external, namespace: network}
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "matrix-auth.mistelinn.org"
  rules:
    - backendRefs:
        - name: matrix-matrix-authentication-service
          namespace: comms
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-element
spec:
  parentRefs:
    - {name: envoy-external, namespace: network}
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "element.mistelinn.org"
  rules:
    - backendRefs:
        - name: matrix-element-web
          namespace: comms
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-rtc
  annotations:
    gatus.home-operations.com/endpoint: |-
      url: "https://rtc.mistelinn.org/sfu/get"
      conditions: ["[STATUS] == 405"]
spec:
  parentRefs:
    - {name: envoy-external, namespace: network}
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "rtc.mistelinn.org"
  rules:
    - backendRefs:
        - name: matrix-matrix-rtc-authorisation-service
          namespace: comms
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /sfu/get
        - path:
            type: PathPrefix
            value: /get_token
    - backendRefs:
        - name: matrix-matrix-rtc-sfu
          namespace: comms
          port: 7880
      matches:
        - path:
            type: PathPrefix
            value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-admin
spec:
  parentRefs:
    - {name: envoy-internal, namespace: network}
  hostnames:
    - "matrix-admin.mistelinn.org"
  rules:
    - backendRefs:
        - name: matrix-element-admin
          namespace: comms
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
