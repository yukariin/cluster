---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-matrix
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  # Single-instance cluster: disable PDB so the node hosting it can be drained
  # for Talos/Kubernetes upgrades (CNPG blocks single-instance drains otherwise).
  enablePDB: false
  managed:
    services:
      disabledDefaultServices:
        - "ro"
        - "r"
  storage:
    size: 10G
    storageClass: ceph-block
  monitoring:
    enablePodMonitor: true

  bootstrap:
    # initdb:
    #   database: synapse
    #   owner: matrix
    recovery:
      source: pg-matrix-restore
      database: synapse
      owner: matrix

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pg-matrix-store
        serverName: pg-matrix

  externalClusters:
    - name: pg-matrix-restore
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: pg-matrix-store
          serverName: pg-matrix
