---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  interval: 1h
  values:
    operatorConfig:
      driverSpecDefaults:
        # Rook supplies the CSI sidecar/cephcsi images via the operator chart's
        # image-set ConfigMap; reference it so images stay in lockstep with Rook.
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: true
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          deploymentStrategy:
            type: Recreate
          priorityClassName: system-cluster-critical
        nodePlugin:
          priorityClassName: system-node-critical

    drivers:
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc

      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot

      nfs:
        enabled: false

      nvmeof:
        enabled: false
