---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
spec:
  chartRef:
    kind: OCIRepository
    name: trust-manager
  interval: 1h
  values:
    app:
      trust:
        namespace: cert-manager
    # Allow trust-manager to write these CA bundles into Secret targets.
    secretTargets:
      enabled: true
      authorizedSecrets:
        - postgres-client-ca
        - postgres-server-ca
