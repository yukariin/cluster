---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: vaultwarden
spec:
  launchUrl: https://passwords.mistelinn.org
  callbackUrls:
    - https://passwords.mistelinn.org/identity/connect/oidc-signin
  allowedUserGroups:
    - name: users
      namespace: security
  pkceEnabled: true
  secret:
    keys:
      clientID: SSO_CLIENT_ID
      clientSecret: SSO_CLIENT_SECRET
