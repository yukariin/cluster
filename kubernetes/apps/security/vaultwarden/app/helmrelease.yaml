---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
            env:
              DOMAIN: "https://passwords.mistelinn.org"
              ROCKET_PORT: &port 80
              ICON_CACHE_FOLDER: "/icons"
              TMP_FOLDER: "/tmp"
              SIGNUPS_ALLOWED: "false"
              SMTP_FROM_NAME: Vaultwarden
              SMTP_FROM: "vaultwarden@mistelinn.org"
              SMTP_HOST: smtp-relay.network.svc.cluster.local
              SMTP_PORT: 25
              SMTP_SECURITY: "off"
              EXPERIMENTAL_CLIENT_FEATURE_FLAGS: "ssh-key-vault-item,ssh-agent"
              SSO_ENABLED: "true"
              SSO_ONLY: "false"
              SSO_PKCE: "true"
              SSO_SIGNUPS_MATCH_EMAIL: "true"
              SSO_AUTHORITY: "https://id.mistelinn.org"
              SSO_SCOPES: "email profile groups openid offline_access"
              DATABASE_URL:
                valueFrom:
                  configMapKeyRef:
                    name: vaultwarden-postgres
                    key: url
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
              - secretRef:
                  name: "{{ .Release.Name }}-oidc-credentials"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /icons
            subPath: data
          - path: /tmp
            subPath: tmp
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: "https://passwords.mistelinn.org/alive"
        hostnames:
          - "passwords.mistelinn.org"
        parentRefs:
          - {name: envoy-external, namespace: network}
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        ports:
          http:
            port: *port
