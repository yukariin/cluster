---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-vaultwarden
spec:
  instances: 1
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
  postgresql:
    parameters:
      timezone: ${CLUSTER_TZ}
  storage:
    size: 5G
    storageClass: democratic-csi-hostpath
  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      wal:
        compression: zstd
      serverName: pg-vaultwarden-v4
      destinationPath: s3://cnpg-backups/
      endpointURL: "https://s3.${CLUSTER_DOMAIN}"
      s3Credentials:
        accessKeyId:
          name: vaultwarden-pg-secret
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: vaultwarden-pg-secret
          key: AWS_SECRET_ACCESS_KEY

  bootstrap:
    # initdb:
    #   database: vaultwarden
    #   owner: vaultwarden
    recovery:
      source: source
      database: vaultwarden
      owner: vaultwarden

  externalClusters:
    - name: source
      barmanObjectStore:
        wal:
          compression: zstd
        serverName: pg-vaultwarden-v3
        destinationPath: s3://cnpg-backups/
        endpointURL: "https://s3.${CLUSTER_DOMAIN}"
        s3Credentials:
          accessKeyId:
            name: vaultwarden-pg-secret
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: vaultwarden-pg-secret
            key: AWS_SECRET_ACCESS_KEY
