---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pocket-id-operator
spec:
  chartRef:
    kind: OCIRepository
    name: pocket-id-operator
  interval: 1h
  values:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      dashboard:
        enabled: true
        grafanaDashboard:
          enabled: true
          instanceSelector:
            matchLabels:
              dashboards: grafana

    instance:
      enabled: true
      name: pocket-id
      serviceMonitor:
        enabled: true
      spec:
        analyticsDisabled: true
        appUrl: "https://id.mistelinn.org"
        image: ghcr.io/pocket-id/pocket-id:v2.9.0-distroless@sha256:e21b13437a542080f8226e4c6281ca26c7909123886606bf967f92e620d73f24
        emailNotifications:
          apiKeyExpiration: true
          loginNotification: true
          oneTimeAccessAsAdmin: true
          verification: true
        encryptionKey:
          valueFrom:
            secretKeyRef:
              name: pocket-id-operator-secret
              key: ENCRYPTION_KEY
        geoip:
          maxmindLicenseKey:
            valueFrom:
              secretKeyRef:
                name: pocket-id-operator-secret
                key: MAXMIND_LICENSE_KEY
        logging:
          level: "info"
          json: true
        persistence:
          enabled: true
          existingClaim: *app
        route:
          enabled: true
          name: pocket-id
          parentRefs:
            - name: envoy-external
              namespace: network
        smtp:
          host: smtp-relay.network.svc.cluster.local
          port: 25
          from: pocket-id@mistelinn.org
          tls: none
        ui:
          sessionDuration: 1440 # 1 day
        userManagement:
          allowOwnAccountEdit: true
          allowUserSignups: "disabled"
          emailsVerified: true
        versionCheckDisabled: true

    users:
      - name: yukarin
        spec:
          admin: true
          email:
            value: "mistelinn@gmail.com"
          firstName:
            value: Yukari
          lastName:
            value: Yakumo

    userGroups:
      - name: admins
        spec:
          friendlyName: Administrators
          users:
            userRefs:
              - name: yukarin
      - name: users
        spec:
          friendlyName: Users
          customClaims:
            - key: kavita-roles
              value: "[ \"Login\", \"Download\", \"library-Manga\" ]"
          users:
            userRefs:
              - name: yukarin
      - name: docs
        spec:
          friendlyName: Documents
          users:
            userRefs:
              - name: yukarin
