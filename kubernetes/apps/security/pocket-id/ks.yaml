---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pocket-id-operator
spec:
  components:
    - ../../../../components/kopiur
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: pocket-id-operator
      namespace: security
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: pocketidoidcclients.pocketid.internal
  interval: 1h
  path: kubernetes/apps/security/pocket-id/operator
  prune: true
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 1Gi
      # nobody:nogroup
      KOPIUR_PUID: "65534"
      KOPIUR_PGID: "65534"
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
