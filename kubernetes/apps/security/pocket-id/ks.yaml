---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pocket-id-operator
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: democratic-csi
      namespace: democratic-csi
  interval: 1h
  path: kubernetes/apps/security/pocket-id/operator
  prune: true
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 1Gi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
