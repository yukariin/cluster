---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  interval: 1h
  values:
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
    kubeletPlugin:
      # xpumd is not deployed, so disable health monitoring to avoid
      # trying to connect to /run/xpumd/intelxpuinfo.sock.
      # With health monitoring off, privileged mode is required for the driver
      # to query hardware details directly from devices.
      privileged: true
      healthMonitoring:
        enabled: false

      nodeSelector:
        node.kubernetes.io/gpu: "true"
