---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: production
spec:
  commonName: "${CLUSTER_DOMAIN}"
  dnsNames:
    - "${CLUSTER_DOMAIN}"
    - "*.${CLUSTER_DOMAIN}"
  duration: 160h
  renewBefore: 48h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: production-tls
