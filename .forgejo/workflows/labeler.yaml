---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Labeler

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    if: ${{ forgejo.event.pull_request.head.repo.full_name == forgejo.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply Labels
        uses: https://github.com/actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          configuration-path: .forgejo/labeler.yaml
